name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # Linux build (CPU + CUDA)
  # ────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.0'
          method: network
          sub-packages: '["nvcc", "cudart-dev", "curand-dev"]'

      - name: Configure
        # Build for a range of common NVIDIA architectures so the release
        # binary runs on Turing (75), Ampere (86), and Ada (89) cards.
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES="75;86;89"

      - name: Build all targets
        run: cmake --build build -j

      - name: Package
        run: |
          PKG=raytracer-linux-x64
          mkdir -p dist/$PKG
          cp build/render build/render_cuda build/benchmark dist/$PKG/
          cp README.md dist/$PKG/
          cd dist && tar czf $PKG.tar.gz $PKG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raytracer-linux-x64
          path: dist/raytracer-linux-x64.tar.gz
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Windows build (CPU only — CUDA on Windows CI is finicky and slow)
  # ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build CPU target
        run: cmake --build build --config Release --target render -j

      - name: Package
        shell: pwsh
        run: |
          $pkg = "raytracer-windows-x64"
          New-Item -ItemType Directory -Force -Path "dist\$pkg" | Out-Null
          Copy-Item build\Release\render.exe "dist\$pkg\"
          Copy-Item README.md "dist\$pkg\"
          Compress-Archive -Path "dist\$pkg\*" -DestinationPath "dist\$pkg.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raytracer-windows-x64
          path: dist/raytracer-windows-x64.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Create the GitHub Release and attach the artifacts
  # ────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            artifacts/raytracer-linux-x64/raytracer-linux-x64.tar.gz
            artifacts/raytracer-windows-x64/raytracer-windows-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false